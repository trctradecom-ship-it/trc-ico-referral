<!DOCTYPE html>
<html>
<head>
<title>Tradecom Referral ICO</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
</head>

<body>

<div class="container">

<h1>Tradecom Referral Dashboard</h1>

<div class="card">
<button onclick="connectWallet()">Connect Wallet</button>
<p id="walletAddress"></p>
</div>

<div class="card">
<h3>Register With Referral</h3>
<input id="refAddress" placeholder="Enter Referral Address">
<button onclick="registerUser()">Register</button>
</div>

<div class="card">
<h3>Buy Level 1 (POL Required)</h3>
<input id="level1Amount" placeholder="Enter POL Amount (example: 0.1)">
<button onclick="buyLevel1()">Buy Level 1</button>
</div>

<div class="card">
<h3>Approve TRC Token</h3>
<input id="approveAmount" placeholder="Enter TRC Amount">
<button onclick="approveTRC()">Approve TRC</button>
</div>

<div class="card">
<h3>Activate Levels</h3>
<button onclick="joinLevel(2)">Join Level 2</button>
<button onclick="joinLevel(3)">Join Level 3</button>
<button onclick="joinLevel(4)">Join Level 4</button>
</div>

</div>

<script>

let provider;
let signer;
let referralContract;
let tokenContract;

const referralAddress = "0xdc1D39272E54590ce404791FaDc431Ca27821F3a";
const tokenAddress = "0xc08983be707bf4b763e7A0f3cCAD3fd00af6620d";

/* ===== CONTRACT ABI ===== */

const referralABI = [
{"inputs":[{"internalType":"address","name":"_upline","type":"address"}],"name":"register","outputs":[],"stateMutability":"nonpayable","type":"function"},
{"inputs":[],"name":"buyLevel1","outputs":[],"stateMutability":"payable","type":"function"},
{"inputs":[],"name":"joinLevel2","outputs":[],"stateMutability":"nonpayable","type":"function"},
{"inputs":[],"name":"joinLevel3","outputs":[],"stateMutability":"nonpayable","type":"function"},
{"inputs":[],"name":"joinLevel4","outputs":[],"stateMutability":"nonpayable","type":"function"}
];

const tokenABI = [
{"inputs":[{"internalType":"address","name":"spender","type":"address"},{"internalType":"uint256","name":"value","type":"uint256"}],"name":"approve","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},
{"inputs":[],"name":"decimals","outputs":[{"internalType":"uint8","name":"","type":"uint8"}],"stateMutability":"view","type":"function"}
];

/* ===== CONNECT WALLET ===== */

async function connectWallet(){

if(!window.ethereum){
alert("Install MetaMask");
return;
}

await ethereum.request({method:'eth_requestAccounts'});

provider = new ethers.providers.Web3Provider(window.ethereum);
signer = provider.getSigner();

const userAddress = await signer.getAddress();
document.getElementById("walletAddress").innerText = "Connected: " + userAddress;

referralContract = new ethers.Contract(referralAddress, referralABI, signer);
tokenContract = new ethers.Contract(tokenAddress, tokenABI, signer);

alert("Wallet Connected");
}

/* ===== REGISTER ===== */

async function registerUser(){

try{

const ref = document.getElementById("refAddress").value;

if(!ethers.utils.isAddress(ref)){
alert("Invalid Referral Address");
return;
}

const tx = await referralContract.register(ref);
alert("Transaction Sent...");

await tx.wait();
alert("Registered Successfully");

}catch(error){
alert(error.message);
}

}

/* ===== BUY LEVEL 1 ===== */

async function buyLevel1(){

try{

const amount = document.getElementById("level1Amount").value;

if(!amount){
alert("Enter POL amount");
return;
}

const tx = await referralContract.buyLevel1({
value: ethers.utils.parseEther(amount)
});

alert("Transaction Sent...");
await tx.wait();

alert("Level 1 Activated");

}catch(error){
alert(error.message);
}

}

/* ===== APPROVE TOKEN ===== */

async function approveTRC(){

try{

const amount = document.getElementById("approveAmount").value;

if(!amount){
alert("Enter TRC amount");
return;
}

const decimals = await tokenContract.decimals();

const tx = await tokenContract.approve(
referralAddress,
ethers.utils.parseUnits(amount, decimals)
);

alert("Approval Sent...");
await tx.wait();

alert("TRC Approved");

}catch(error){
alert(error.message);
}

}

/* ===== JOIN LEVELS ===== */

async function joinLevel(level){

try{

let tx;

if(level === 2) tx = await referralContract.joinLevel2();
if(level === 3) tx = await referralContract.joinLevel3();
if(level === 4) tx = await referralContract.joinLevel4();

alert("Transaction Sent...");
await tx.wait();

alert("Level " + level + " Activated");

}catch(error){
alert(error.message);
}

}

</script>

</body>
</html>
