<!DOCTYPE html>
<html>
<head>
<title>Tradecom Referral Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
}

.container{
max-width:600px;
margin:auto;
padding:40px 20px;
}

h1{
color:gold;
}

.card{
background:#1c1c1c;
padding:25px;
margin:20px 0;
border-radius:12px;
box-shadow:0 0 10px rgba(255,215,0,0.2);
}

button{
padding:12px 20px;
margin:10px 0;
font-size:16px;
border:none;
border-radius:6px;
background:gold;
cursor:pointer;
width:100%;
font-weight:bold;
}

input{
padding:10px;
width:100%;
margin:10px 0;
border-radius:6px;
border:none;
font-size:16px;
}

button:hover{
opacity:0.85;
}
</style>
</head>

<body>

<div class="container">

<h1>Tradecom Referral ICO</h1>

<div class="card">
<button onclick="connectWallet()">Connect Wallet</button>
</div>

<div class="card">
<h3>Register</h3>
<input id="refAddress" placeholder="Enter Referral Address">
<button onclick="registerUser()">Register</button>
</div>

<div class="card">
<h3>Level 1 (POL Required)</h3>
<input id="level1Amount" placeholder="Enter POL Amount">
<button onclick="buyLevel1()">Buy Level 1</button>
</div>

<div class="card">
<h3>Approve TRC Token</h3>
<input id="approveAmount" placeholder="Enter TRC Amount to Approve">
<button onclick="approveTRC()">Approve TRC</button>
</div>

<div class="card">
<h3>Activate Next Levels</h3>
<button onclick="joinLevel2()">Join Level 2</button>
<button onclick="joinLevel3()">Join Level 3</button>
<button onclick="joinLevel4()">Join Level 4</button>
</div>

</div>

<script>

let provider;
let signer;
let referralContract;
let tokenContract;

const referralAddress =
"0xdc1D39272E54590ce404791FaDc431Ca27821F3a";

const tokenAddress =
"0xc08983be707bf4b763e7A0f3cCAD3fd00af6620d";

const referralABI = [
{"inputs":[{"internalType":"address","name":"_upline","type":"address"}],"name":"register","outputs":[],"stateMutability":"nonpayable","type":"function"},
{"inputs":[],"name":"buyLevel1","outputs":[],"stateMutability":"payable","type":"function"},
{"inputs":[],"name":"joinLevel2","outputs":[],"stateMutability":"nonpayable","type":"function"},
{"inputs":[],"name":"joinLevel3","outputs":[],"stateMutability":"nonpayable","type":"function"},
{"inputs":[],"name":"joinLevel4","outputs":[],"stateMutability":"nonpayable","type":"function"}
];

const tokenABI = [
{"inputs":[{"internalType":"address","name":"spender","type":"address"},{"internalType":"uint256","name":"value","type":"uint256"}],"name":"approve","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},
{"inputs":[],"name":"decimals","outputs":[{"internalType":"uint8","name":"","type":"uint8"}],"stateMutability":"view","type":"function"}
];

async function connectWallet(){

if(!window.ethereum){
alert("Install MetaMask");
return;
}

await window.ethereum.request({method:"eth_requestAccounts"});

provider = new ethers.providers.Web3Provider(window.ethereum);
signer = provider.getSigner();

referralContract = new ethers.Contract(referralAddress, referralABI, signer);
tokenContract = new ethers.Contract(tokenAddress, tokenABI, signer);

alert("Wallet Connected");
}

async function registerUser(){

const ref = document.getElementById("refAddress").value;

if(!ref){
alert("Enter Referral Address");
return;
}

const tx = await referralContract.register(ref);
await tx.wait();

alert("Registered Successfully");
}

async function buyLevel1(){

const amount = document.getElementById("level1Amount").value;

if(!amount){
alert("Enter POL Amount");
return;
}

const tx = await referralContract.buyLevel1({
value: ethers.utils.parseEther(amount)
});

await tx.wait();

alert("Level 1 Purchased");
}

async function approveTRC(){

const amount = document.getElementById("approveAmount").value;

if(!amount){
alert("Enter TRC Amount");
return;
}

const decimals = await tokenContract.decimals();

const tx = await tokenContract.approve(
referralAddress,
ethers.utils.parseUnits(amount, decimals)
);

await tx.wait();

alert("TRC Approved Successfully");
}

async function joinLevel2(){

const tx = await referralContract.joinLevel2();
await tx.wait();
alert("Joined Level 2");
}

async function joinLevel3(){

const tx = await referralContract.joinLevel3();
await tx.wait();
alert("Joined Level 3");
}

async function joinLevel4(){

const tx = await referralContract.joinLevel4();
await tx.wait();
alert("Joined Level 4");
}

</script>

</body>
</html>
