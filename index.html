<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tradecom Referral ICO</title> 

<link rel="icon" type="image/png" href="./trclogo.png?v=5">
<link rel="apple-touch-icon" href="./trclogo.png">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#000000">

  
<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

</head>
<body> 

<div class="container">

<h1>TRC Referral Contract</h1>

<div class="card">
<h3>1️⃣ Connect Wallet</h3>
<button onclick="connectWallet()">Connect</button>
<p id="wallet"></p>
</div>

<div class="card">
<h3>2️⃣ Register</h3>
<input id="refAddress" placeholder="Enter Referral Address">
<button onclick="registerUser()">Confirm</button>
</div>

<div class="card">
<h3>3️⃣ Buy Level 1</h3>
<input id="levelAmount" placeholder="Enter POL Amount (Min TRC Buy $20)">
<button onclick="buyLevel1()">Confirm</button>
</div>

<div class="card">
<h3>4️⃣ Approve TRC</h3>
<input id="approveAmount" placeholder="Enter TRC Amount">
<button onclick="approveTRC()">Confirm</button>
</div>

<div class="card">
<h3>5️⃣ Join Levels</h3>
<button onclick="joinLevel(2)">joinLevel 2</button>
<button onclick="joinLevel(3)">joinLevel 3</button>
<button onclick="joinLevel(4)">joinLevel 4</button>
</div>

<div class="card">
<h3>Transaction Status</h3>
<p id="status"></p>
</div>

<!-- ✅ ADDED THIS -->
<div class="card">
<h3>6️⃣ My Info</h3>
<button onclick="getMyInfo()">Show My Info</button>
<button onclick="getMyReferralLink()">Copy Referral Link</button>  
<p id="myInfo"></p>
</div>

</div>

<script>

let provider;
let signer;
let referralContract;
let tokenContract;
let connected = false;

const referralAddress = "0x375e7401e8a829587407B64339E3C50E4DE5128B";
const tokenAddress = "0x56620a4c9667375577B9D543440c3EFE7Ca75673";

const referralABI = [
{"inputs":[{"internalType":"address","name":"_upline","type":"address"}],"name":"register","outputs":[],"stateMutability":"nonpayable","type":"function"},
{"inputs":[],"name":"buyLevel1","outputs":[],"stateMutability":"payable","type":"function"},
{"inputs":[],"name":"joinLevel2","outputs":[],"stateMutability":"nonpayable","type":"function"},
{"inputs":[],"name":"joinLevel3","outputs":[],"stateMutability":"nonpayable","type":"function"},
{"inputs":[],"name":"joinLevel4","outputs":[],"stateMutability":"nonpayable","type":"function"},

// ✅ ADDED THIS ABI
{"inputs":[{"internalType":"address","name":"","type":"address"}],
"name":"users",
"outputs":[
{"internalType":"bool","name":"registered","type":"bool"},
{"internalType":"address","name":"upline","type":"address"},
{"internalType":"uint8","name":"level","type":"uint8"}
],
"stateMutability":"view",
"type":"function"}

];

const tokenABI = [
{"inputs":[{"internalType":"address","name":"spender","type":"address"},{"internalType":"uint256","name":"value","type":"uint256"}],"name":"approve","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},
{"inputs":[],"name":"decimals","outputs":[{"internalType":"uint8","name":"","type":"uint8"}],"stateMutability":"view","type":"function"}
];

function updateStatus(message){
document.getElementById("status").innerHTML = message;
}

function checkConnection(){
if(!connected){
alert("Connect Wallet First");
return false;
}
return true;
}

async function connectWallet(){

if(!window.ethereum){
alert("Install MetaMask");
return;
}

await ethereum.request({method:'eth_requestAccounts'});

provider = new ethers.providers.Web3Provider(window.ethereum);
signer = provider.getSigner();

const address = await signer.getAddress();
document.getElementById("wallet").innerText = "Connected: " + address;

referralContract = new ethers.Contract(referralAddress, referralABI, signer);
tokenContract = new ethers.Contract(tokenAddress, tokenABI, signer);

connected = true;

updateStatus("Wallet Connected ✅");
}

async function handleTransaction(txPromise){
    try{
        document.getElementById("status").innerHTML =
          `<span class="tx-pending">⏳ Waiting for confirmation...</span>`;

        const tx = await txPromise;

        document.getElementById("status").innerHTML =
          `<a href="https://polygonscan.com/tx/${tx.hash}" target="_blank">
            🔄 Transaction Pending (View)
          </a>`;

        await tx.wait();

        document.getElementById("status").innerHTML =
          `<span class="tx-success">✅ Transaction Confirmed</span>`;

    }catch(e){
        document.getElementById("status").innerHTML =
          `<span class="tx-fail">❌ Transaction Failed</span>`;
    }
}

async function registerUser(){

if(!checkConnection()) return;

const ref = document.getElementById("refAddress").value;
const userAddr = await signer.getAddress();

if(!ethers.utils.isAddress(ref)){
alert("Invalid Address");
return;
}

if(ref.toLowerCase() === userAddr.toLowerCase()){
alert("You cannot refer yourself");
return;
}

handleTransaction(referralContract.register(ref));
}  

async function buyLevel1(){

if(!checkConnection()) return;

const amount = document.getElementById("levelAmount").value;

if(!amount){
alert("Enter POL amount");
return;
}

handleTransaction(
referralContract.buyLevel1({
value: ethers.utils.parseEther(amount)
})
);
}

async function approveTRC(){

if(!checkConnection()) return;

const amount = document.getElementById("approveAmount").value;

if(!amount){
alert("Enter amount");
return;
}

const decimals = await tokenContract.decimals();

handleTransaction(
tokenContract.approve(
referralAddress,
ethers.utils.parseUnits(amount, decimals)
)
);
}

async function joinLevel(level){

if(!checkConnection()) return;

if(level === 2) handleTransaction(referralContract.joinLevel2());
if(level === 3) handleTransaction(referralContract.joinLevel3());
if(level === 4) handleTransaction(referralContract.joinLevel4());
}

// ✅ ADDED FUNCTION
async function getMyInfo(){

if(!checkConnection()) return;

try{

const addr = await signer.getAddress();
const user = await referralContract.users(addr);

document.getElementById("myInfo").innerHTML = `
Upline: ${user.upline} <br>
Level: ${user.level}
`;

}catch(e){
updateStatus("Error ❌ " + e.message);
}

}

async function getMyReferralLink(){

if(!checkConnection()) return;

const addr = await signer.getAddress();

// ✅ GitHub Pages safe link
const cleanURL = window.location.origin + window.location.pathname;

const link = cleanURL + "?ref=" + addr;

navigator.clipboard.writeText(link);

alert("Referral link copied:\n" + link);
}



// ================= AUTO REFERRAL FROM URL =================
window.onload = function(){

    const params = new URLSearchParams(window.location.search);
    const ref = params.get("ref");

    if(ref && ethers.utils.isAddress(ref)){
        const input = document.getElementById("refAddress");

        if(input){
            input.value = ref;
            input.readOnly = true; // 🔥 lock input
        }

        document.getElementById("status").innerText =
          "Referral detected ✅";
    }
};



  
</script>

</body>
</html>
